  main.py: |
    from fastapi import FastAPI, File, UploadFile, Form, Depends, HTTPException, Header
    from fastapi.middleware.cors import CORSMiddleware
    from fastapi.responses import FileResponse, StreamingResponse
    from pydantic import BaseModel
    from typing import Optional, List
    from google.oauth2 import id_token
    from google.auth.transport import requests as google_requests
    import pymysql
    import os
    import shutil
    import time
    import io
    import zipfile
    import re
    import uuid
    import json

    app = FastAPI(title="API Gestión de Usuarios - ICA (Asegurada)")

    # Origenes permitidos para CORS (el frontend). Configurable por variable de entorno.
    ALLOWED_ORIGINS = os.getenv(
        "ALLOWED_ORIGINS",
        "http://192.168.49.2.nip.io:30080,http://192.168.0.254:30080"
    ).split(",")

    app.add_middleware(
        CORSMiddleware,
        allow_origins=ALLOWED_ORIGINS,
        allow_credentials=True,
        allow_methods=["*"],
        allow_headers=["*"],
    )

    DB_HOST = os.getenv("DB_HOST", "mysql-nodeport")
    DB_USER = os.getenv("DB_USER", "root")
    DB_PASS = os.getenv("DB_PASS", "")
    DB_NAME = os.getenv("DB_NAME", "gestion_usuarios")

    GOOGLE_CLIENT_ID = "374163159167-hj3aofouk0mae2ksk0qq5agevdlengfj.apps.googleusercontent.com"
    # Solo se permiten cuentas de este dominio institucional
    DOMINIO_PERMITIDO = os.getenv("DOMINIO_PERMITIDO", "aragon.unam.mx")
    # Correos admin permitidos aunque no sean del dominio (separados por coma)
    CORREOS_ADMIN = [c.strip().lower() for c in os.getenv("CORREOS_ADMIN", "").split(",") if c.strip()]

    os.makedirs("/app/pdfs", exist_ok=True)
    os.makedirs("/app/uploads", exist_ok=True)  # imagenes del CMS

    def ruta_pdf(nombre):
        # Sanitiza el nombre para evitar path traversal (ej. "../../etc/algo").
        # Nos quedamos solo con el nombre de archivo base, sin separadores de ruta.
        seguro = os.path.basename(str(nombre)).replace("\\", "").strip()
        return f"/app/pdfs/{seguro}.pdf"

    def ruta_imagen(nombre):
        # Misma sanitizacion para las imagenes del CMS (anti path traversal)
        seguro = os.path.basename(str(nombre)).replace("\\", "").strip()
        return f"/app/uploads/{seguro}"

    def validar_y_guardar_imagen(imagen, base_sin_ext):
        # Valida formato/tamano, guarda en el volumen y devuelve (url, error).
        ext = os.path.splitext(imagen.filename or "")[1].lower()
        if ext not in [".jpg", ".jpeg", ".png", ".gif", ".webp"]:
            return None, "Formato no permitido (usa jpg, png, gif o webp)."
        datos = imagen.file.read()
        if len(datos) > 2 * 1024 * 1024:
            return None, "La imagen excede 2 MB."
        nombre_archivo = base_sin_ext + ext
        with open(ruta_imagen(nombre_archivo), "wb") as f:
            f.write(datos)
        return f"/imagenes/{nombre_archivo}", None

    def get_db_connection():
        return pymysql.connect(
            host=DB_HOST, user=DB_USER, password=DB_PASS, database=DB_NAME,
            cursorclass=pymysql.cursors.DictCursor
        )

    # --- (Migracion automatica de la base de datos) ---
    # Agrega las columnas/tablas nuevas sin borrar nada de lo existente.
    def _columna_existe(cursor, tabla, columna):
        cursor.execute(
            "SELECT COUNT(*) AS c FROM information_schema.COLUMNS "
            "WHERE TABLE_SCHEMA=%s AND TABLE_NAME=%s AND COLUMN_NAME=%s",
            (DB_NAME, tabla, columna)
        )
        return cursor.fetchone()['c'] > 0

    def inicializar_db():
        conn = get_db_connection()
        with conn.cursor() as cursor:
            # Por si fuera una instalacion nueva, aseguramos la tabla usuarios
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS usuarios ("
                "  id INT AUTO_INCREMENT PRIMARY KEY,"
                "  numero_cuenta VARCHAR(20),"
                "  nombres VARCHAR(255),"
                "  apellidos VARCHAR(255),"
                "  nombre VARCHAR(255),"
                "  telefono VARCHAR(20),"
                "  correo VARCHAR(255),"
                "  carrera VARCHAR(50),"
                "  semestre VARCHAR(20),"
                "  area VARCHAR(100),"
                "  semana_registro VARCHAR(20)"
                ")"
            )
            # Para instalaciones existentes: agregamos las columnas nuevas si faltan
            if not _columna_existe(cursor, "usuarios", "nombres"):
                cursor.execute("ALTER TABLE usuarios ADD COLUMN nombres VARCHAR(255)")
            if not _columna_existe(cursor, "usuarios", "apellidos"):
                cursor.execute("ALTER TABLE usuarios ADD COLUMN apellidos VARCHAR(255)")
            if not _columna_existe(cursor, "usuarios", "area"):
                cursor.execute("ALTER TABLE usuarios ADD COLUMN area VARCHAR(100)")
            if not _columna_existe(cursor, "usuarios", "semana_registro"):
                cursor.execute("ALTER TABLE usuarios ADD COLUMN semana_registro VARCHAR(20)")
            # Tabla nueva para el historico de proyectos (un alumno -> muchos proyectos)
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS proyectos ("
                "  id INT AUTO_INCREMENT PRIMARY KEY,"
                "  usuario_id INT NOT NULL,"
                "  nombre VARCHAR(255) NOT NULL,"
                "  FOREIGN KEY (usuario_id) REFERENCES usuarios(id) ON DELETE CASCADE"
                ")"
            )
            # CMS: contenido editable de la landing (overrides; el HTML tiene los defaults)
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS contenido ("
                "  clave VARCHAR(100) PRIMARY KEY,"
                "  valor TEXT,"
                "  seccion VARCHAR(50)"
                ")"
            )
            # CMS: galeria de proyectos (por curso)
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS galeria ("
                "  id INT AUTO_INCREMENT PRIMARY KEY,"
                "  curso VARCHAR(50),"
                "  titulo VARCHAR(255),"
                "  descripcion TEXT,"
                "  archivo VARCHAR(255)"
                ")"
            )
            # CMS: varias imagenes por proyecto de la galeria
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS galeria_imagenes ("
                "  id INT AUTO_INCREMENT PRIMARY KEY,"
                "  galeria_id INT NOT NULL,"
                "  archivo VARCHAR(255),"
                "  FOREIGN KEY (galeria_id) REFERENCES galeria(id) ON DELETE CASCADE"
                ")"
            )
            # CMS: horarios (cada fila = un bloque; "Libre" = ausencia de bloque)
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS horarios ("
                "  id INT AUTO_INCREMENT PRIMARY KEY,"
                "  salon VARCHAR(50),"
                "  dia VARCHAR(20),"
                "  hora_inicio VARCHAR(5),"
                "  hora_fin VARCHAR(5),"
                "  materia VARCHAR(255),"
                "  profesor VARCHAR(255),"
                "  tipo VARCHAR(20)"
                ")"
            )
        conn.commit()
        conn.close()

    @app.on_event("startup")
    def _migracion_startup():
        # La BD puede tardar en estar lista; reintentamos unas veces
        for intento in range(10):
            try:
                inicializar_db()
                return
            except Exception as e:
                print(f"Esperando a la base de datos... ({intento+1}/10): {e}")
                time.sleep(3)

    # --- (Validación JWT) ---
    def verificar_token(authorization: str = Header(None)):
        if not authorization or not authorization.startswith("Bearer "):
            raise HTTPException(status_code=401, detail="Falta el gafete de seguridad (Token)")
        
        token = authorization.split(" ")[1]
        try:
            # Google verifica criptográficamente que el token no sea falso
            idinfo = id_token.verify_oauth2_token(token, google_requests.Request(), GOOGLE_CLIENT_ID)
        except ValueError:
            raise HTTPException(status_code=401, detail="Token inválido o expirado")

        # Acceso permitido a cuentas del dominio institucional o a admins de la lista blanca
        correo = idinfo.get("email", "").lower()
        autorizado = correo.endswith("@" + DOMINIO_PERMITIDO) or correo in CORREOS_ADMIN
        if not idinfo.get("email_verified") or not autorizado:
            raise HTTPException(status_code=403, detail=f"Cuenta no autorizada: {correo or 'sin correo'}")

        return idinfo

    # Gate mas estricto: solo administradores (correo en la lista CORREOS_ADMIN).
    # Las cuentas del dominio pueden usar registro/panel, pero editar el CMS es solo admin.
    def verificar_admin(user_info: dict = Depends(verificar_token)):
        correo = user_info.get("email", "").lower()
        if correo not in CORREOS_ADMIN:
            raise HTTPException(status_code=403, detail="Requiere cuenta de administrador")
        return user_info

    class UsuarioNuevo(BaseModel):
        numero_cuenta: str
        nombres: str
        apellidos: str
        telefono: str
        correo: str
        carrera: str
        semestre: str
        area: Optional[str] = None
        semana_registro: Optional[str] = None

    class ProyectoNuevo(BaseModel):
        nombre: str

    class ContenidoItem(BaseModel):
        clave: str
        valor: str
        seccion: Optional[str] = None

    class HorarioNuevo(BaseModel):
        salon: str
        dia: str
        hora_inicio: str
        hora_fin: str
        materia: str
        profesor: Optional[str] = ""
        tipo: Optional[str] = "clase"

    # Agregamos "Depends(verificar_token)" para proteger las rutas vitales

    @app.get("/usuarios")
    def obtener_usuarios(user_info: dict = Depends(verificar_token)):
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT * FROM usuarios")
                usuarios = cursor.fetchall()
            conn.close()
            return usuarios
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    @app.get("/usuarios/{usuario_id}")
    def obtener_perfil(usuario_id: int, user_info: dict = Depends(verificar_token)):
        # Devuelve el perfil del alumno junto con su historico de proyectos
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT * FROM usuarios WHERE id = %s", (usuario_id,))
                usuario = cursor.fetchone()
                if not usuario:
                    conn.close()
                    return {"status": "Error", "detalle": "Alumno no encontrado"}
                cursor.execute("SELECT id, nombre FROM proyectos WHERE usuario_id = %s ORDER BY id", (usuario_id,))
                usuario["proyectos"] = cursor.fetchall()
            conn.close()
            return usuario
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    @app.post("/usuarios")
    def crear_usuario(
        numero_cuenta: str = Form(...),
        nombres: str = Form(...),
        apellidos: str = Form(...),
        telefono: str = Form(...),
        correo: str = Form(...),
        carrera: str = Form(...),
        semestre: str = Form(...),
        area: str = Form(...),
        historial_pdf: UploadFile = File(...),
        user_info: dict = Depends(verificar_token) # <--- Protegido
    ):
        try:
            # El nombre completo (para el PDF y la vista) se arma como "APELLIDOS NOMBRES"
            nombre = f"{apellidos} {nombres}".strip()
            # Guardamos el PDF con el nombre de la persona (ruta sanitizada)
            file_path = ruta_pdf(nombre)
            with open(file_path, "wb") as buffer:
                shutil.copyfileobj(historial_pdf.file, buffer)

            conn = get_db_connection()
            with conn.cursor() as cursor:
                sql = "INSERT INTO usuarios (numero_cuenta, nombres, apellidos, nombre, telefono, correo, carrera, semestre, area) VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s)"
                val = (numero_cuenta, nombres, apellidos, nombre, telefono, correo, carrera, semestre, area)
                cursor.execute(sql, val)
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Usuario y PDF guardados correctamente."}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    # === CMS: contenido editable de la landing ===

    @app.get("/admin/check")
    def admin_check(user_info: dict = Depends(verificar_admin)):
        # Sirve para que el frontend sepa si la sesion actual es de administrador.
        return {"ok": True, "correo": user_info.get("email", "")}

    @app.get("/contenido")
    def obtener_contenido():
        # Publico (la landing es publica). Devuelve los overrides como {clave: valor}.
        # Si algo falla, devolvemos {} para que el frontend use sus textos por defecto.
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT clave, valor FROM contenido")
                filas = cursor.fetchall()
            conn.close()
            return {f["clave"]: f["valor"] for f in filas}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {}

    @app.put("/contenido")
    def actualizar_contenido(items: List[ContenidoItem], user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        # Recibe una lista de campos y los inserta/actualiza (upsert).
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                for item in items:
                    cursor.execute(
                        "INSERT INTO contenido (clave, valor, seccion) VALUES (%s, %s, %s) "
                        "ON DUPLICATE KEY UPDATE valor=VALUES(valor), seccion=COALESCE(VALUES(seccion), seccion)",
                        (item.clave, item.valor, item.seccion)
                    )
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Contenido actualizado."}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    @app.post("/contenido/imagen")
    def subir_imagen(clave: str = Form(...), imagen: UploadFile = File(...), user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        # Sube una imagen, la guarda en el volumen y registra su URL como contenido[clave].
        try:
            ext = os.path.splitext(imagen.filename or "")[1].lower()
            if ext not in [".jpg", ".jpeg", ".png", ".gif", ".webp"]:
                return {"status": "Error", "detalle": "Formato no permitido (usa jpg, png, gif o webp)."}
            datos = imagen.file.read()
            if len(datos) > 2 * 1024 * 1024:
                return {"status": "Error", "detalle": "La imagen excede 2 MB."}
            # Nombre de archivo derivado de la clave (re-subir reemplaza, sin huerfanos)
            base = re.sub(r"[^a-zA-Z0-9_-]", "_", clave)
            nombre_archivo = base + ext
            with open(ruta_imagen(nombre_archivo), "wb") as f:
                f.write(datos)
            url = f"/imagenes/{nombre_archivo}"
            # Guardamos la URL como el valor de contenido para esa clave
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute(
                    "INSERT INTO contenido (clave, valor, seccion) VALUES (%s, %s, %s) "
                    "ON DUPLICATE KEY UPDATE valor=VALUES(valor), seccion=COALESCE(VALUES(seccion), seccion)",
                    (clave, url, clave.split(".")[0])
                )
            conn.commit()
            conn.close()
            return {"status": "Éxito", "url": url}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    @app.get("/imagenes/{nombre}")
    def ver_imagen(nombre: str):
        # Publico: sirve las imagenes subidas por el CMS
        ruta = ruta_imagen(nombre)
        if os.path.exists(ruta):
            return FileResponse(ruta)
        return {"Error": "Imagen no encontrada"}

    # === CMS: galeria de proyectos ===

    @app.get("/galeria")
    def obtener_galeria():
        # Publico: cada proyecto con su lista de imagenes (la 1ra es la portada)
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT id, curso, titulo, descripcion, archivo FROM galeria ORDER BY curso, id")
                items = cursor.fetchall()
                cursor.execute("SELECT galeria_id, archivo FROM galeria_imagenes ORDER BY id")
                filas = cursor.fetchall()
            conn.close()
            por_proyecto = {}
            for r in filas:
                por_proyecto.setdefault(r["galeria_id"], []).append(r["archivo"])
            for it in items:
                imgs = por_proyecto.get(it["id"], [])
                # Compatibilidad con proyectos viejos (una sola imagen en 'archivo')
                if not imgs and it.get("archivo"):
                    imgs = [it["archivo"]]
                it["imagenes"] = imgs
            return items
        except Exception as e:
            print(f"[ERROR] {e}")
            return []

    @app.post("/galeria")
    def agregar_galeria(curso: str = Form(...), titulo: str = Form(...), descripcion: str = Form(""), imagenes: List[UploadFile] = File(...), user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        try:
            if len(imagenes) > 5:
                return {"status": "Error", "detalle": "Máximo 5 imágenes por proyecto."}
            urls = []
            for img in imagenes:
                url, error = validar_y_guardar_imagen(img, "galeria_" + uuid.uuid4().hex)
                if error:
                    return {"status": "Error", "detalle": error}
                urls.append(url)
            conn = get_db_connection()
            with conn.cursor() as cursor:
                # 'archivo' guarda la portada (1ra imagen) por compatibilidad
                cursor.execute(
                    "INSERT INTO galeria (curso, titulo, descripcion, archivo) VALUES (%s, %s, %s, %s)",
                    (curso, titulo, descripcion, urls[0] if urls else None)
                )
                gid = cursor.lastrowid
                for u in urls:
                    cursor.execute("INSERT INTO galeria_imagenes (galeria_id, archivo) VALUES (%s, %s)", (gid, u))
            conn.commit()
            conn.close()
            return {"status": "Éxito"}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    @app.delete("/galeria/{item_id}")
    def eliminar_galeria(item_id: int, user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                # Borrar los archivos de todas las imagenes del proyecto
                cursor.execute("SELECT archivo FROM galeria_imagenes WHERE galeria_id = %s", (item_id,))
                rutas = [r["archivo"] for r in cursor.fetchall() if r.get("archivo")]
                cursor.execute("SELECT archivo FROM galeria WHERE id = %s", (item_id,))
                fila = cursor.fetchone()
                if fila and fila.get("archivo"):
                    rutas.append(fila["archivo"])
                for a in rutas:
                    ruta = ruta_imagen(os.path.basename(a))
                    if os.path.exists(ruta):
                        os.remove(ruta)
                cursor.execute("DELETE FROM galeria_imagenes WHERE galeria_id = %s", (item_id,))
                cursor.execute("DELETE FROM galeria WHERE id = %s", (item_id,))
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Proyecto eliminado."}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    # === CMS: horarios ===

    @app.get("/horarios")
    def obtener_horarios():
        # Publico: todos los bloques de horario (la rejilla se arma en el frontend)
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT id, salon, dia, hora_inicio, hora_fin, materia, profesor, tipo FROM horarios ORDER BY salon, dia, hora_inicio")
                bloques = cursor.fetchall()
            conn.close()
            return bloques
        except Exception as e:
            print(f"[ERROR] {e}")
            return []

    @app.post("/horarios")
    def agregar_horario(bloque: HorarioNuevo, user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        try:
            # Validacion basica: la hora fin debe ser mayor que la de inicio
            if bloque.hora_fin <= bloque.hora_inicio:
                return {"status": "Error", "detalle": "La hora de fin debe ser mayor que la de inicio."}
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute(
                    "INSERT INTO horarios (salon, dia, hora_inicio, hora_fin, materia, profesor, tipo) VALUES (%s, %s, %s, %s, %s, %s, %s)",
                    (bloque.salon, bloque.dia, bloque.hora_inicio, bloque.hora_fin, bloque.materia, bloque.profesor, bloque.tipo)
                )
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Bloque agregado."}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    @app.delete("/horarios/{bloque_id}")
    def eliminar_horario(bloque_id: int, user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("DELETE FROM horarios WHERE id = %s", (bloque_id,))
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Bloque eliminado."}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    # === CMS: respaldo completo (exportar / importar) ===

    @app.get("/respaldo")
    def exportar_respaldo(user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        # Devuelve un ZIP con todo el contenido del CMS (datos.json) + las imagenes del volumen.
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT clave, valor, seccion FROM contenido")
                contenido = cursor.fetchall()
                cursor.execute("SELECT id, curso, titulo, descripcion, archivo FROM galeria")
                galeria = cursor.fetchall()
                cursor.execute("SELECT id, galeria_id, archivo FROM galeria_imagenes")
                galeria_imagenes = cursor.fetchall()
                cursor.execute("SELECT id, salon, dia, hora_inicio, hora_fin, materia, profesor, tipo FROM horarios")
                horarios = cursor.fetchall()
            conn.close()
            datos = {"contenido": contenido, "galeria": galeria, "galeria_imagenes": galeria_imagenes, "horarios": horarios}
            buffer = io.BytesIO()
            with zipfile.ZipFile(buffer, "w", zipfile.ZIP_DEFLATED) as zf:
                zf.writestr("datos.json", json.dumps(datos, ensure_ascii=False, default=str))
                if os.path.isdir("/app/uploads"):
                    for nombre in os.listdir("/app/uploads"):
                        ruta = os.path.join("/app/uploads", nombre)
                        if os.path.isfile(ruta):
                            zf.write(ruta, "uploads/" + nombre)
            buffer.seek(0)
            return StreamingResponse(
                buffer,
                media_type="application/zip",
                headers={"Content-Disposition": "attachment; filename=cms-respaldo.zip"}
            )
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

    @app.post("/respaldo")
    def importar_respaldo(archivo: UploadFile = File(...), user_info: dict = Depends(verificar_admin)): # <--- Solo admin
        # OJO: REEMPLAZA todo el contenido actual del CMS por el del respaldo.
        try:
            buffer = io.BytesIO(archivo.file.read())
            with zipfile.ZipFile(buffer, "r") as zf:
                datos = json.loads(zf.read("datos.json").decode("utf-8"))
                # Restaurar las imagenes al volumen
                for nombre in zf.namelist():
                    if nombre.startswith("uploads/") and not nombre.endswith("/"):
                        base = os.path.basename(nombre)
                        if base:
                            with open(ruta_imagen(base), "wb") as f:
                                f.write(zf.read(nombre))
            conn = get_db_connection()
            with conn.cursor() as cursor:
                # Limpiar (respetando las llaves foraneas) y reinsertar
                cursor.execute("DELETE FROM galeria_imagenes")
                cursor.execute("DELETE FROM galeria")
                cursor.execute("DELETE FROM horarios")
                cursor.execute("DELETE FROM contenido")
                for c in datos.get("contenido", []):
                    cursor.execute("INSERT INTO contenido (clave, valor, seccion) VALUES (%s, %s, %s)",
                                   (c["clave"], c.get("valor"), c.get("seccion")))
                for g in datos.get("galeria", []):
                    cursor.execute("INSERT INTO galeria (id, curso, titulo, descripcion, archivo) VALUES (%s, %s, %s, %s, %s)",
                                   (g["id"], g.get("curso"), g.get("titulo"), g.get("descripcion"), g.get("archivo")))
                for gi in datos.get("galeria_imagenes", []):
                    cursor.execute("INSERT INTO galeria_imagenes (id, galeria_id, archivo) VALUES (%s, %s, %s)",
                                   (gi["id"], gi["galeria_id"], gi.get("archivo")))
                for ho in datos.get("horarios", []):
                    cursor.execute("INSERT INTO horarios (id, salon, dia, hora_inicio, hora_fin, materia, profesor, tipo) VALUES (%s, %s, %s, %s, %s, %s, %s, %s)",
                                   (ho["id"], ho.get("salon"), ho.get("dia"), ho.get("hora_inicio"), ho.get("hora_fin"), ho.get("materia"), ho.get("profesor"), ho.get("tipo")))
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Respaldo restaurado."}
        except Exception as e:
            print(f"[ERROR] {e}")
            return {"status": "Error", "detalle": "Ocurrió un error procesando la solicitud."}

