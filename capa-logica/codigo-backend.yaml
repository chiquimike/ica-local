apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-codigo
data:
  requirements.txt: |
    fastapi
    uvicorn
    pymysql
    pydantic
    python-multipart
    google-auth
    requests
  main.py: |
    from fastapi import FastAPI, File, UploadFile, Form, Depends, HTTPException, Header
    from fastapi.middleware.cors import CORSMiddleware
    from fastapi.responses import FileResponse
    from pydantic import BaseModel
    from typing import Optional
    from google.oauth2 import id_token
    from google.auth.transport import requests as google_requests
    import pymysql
    import os
    import shutil
    import time

    app = FastAPI(title="API Gestión de Usuarios - ICA (Asegurada)")

    app.add_middleware(
        CORSMiddleware,
        allow_origins=["*"],
        allow_credentials=True,
        allow_methods=["*"],
        allow_headers=["*"],
    )

    DB_HOST = os.getenv("DB_HOST", "mysql-nodeport")
    DB_USER = os.getenv("DB_USER", "root")
    DB_PASS = os.getenv("DB_PASS", "1ca_01")
    DB_NAME = os.getenv("DB_NAME", "gestion_usuarios")
    
    GOOGLE_CLIENT_ID = "374163159167-hj3aofouk0mae2ksk0qq5agevdlengfj.apps.googleusercontent.com" 

    os.makedirs("/app/pdfs", exist_ok=True)

    def get_db_connection():
        return pymysql.connect(
            host=DB_HOST, user=DB_USER, password=DB_PASS, database=DB_NAME,
            cursorclass=pymysql.cursors.DictCursor
        )

    # --- (Migracion automatica de la base de datos) ---
    # Agrega las columnas/tablas nuevas sin borrar nada de lo existente.
    def _columna_existe(cursor, tabla, columna):
        cursor.execute(
            "SELECT COUNT(*) AS c FROM information_schema.COLUMNS "
            "WHERE TABLE_SCHEMA=%s AND TABLE_NAME=%s AND COLUMN_NAME=%s",
            (DB_NAME, tabla, columna)
        )
        return cursor.fetchone()['c'] > 0

    def inicializar_db():
        conn = get_db_connection()
        with conn.cursor() as cursor:
            # Por si fuera una instalacion nueva, aseguramos la tabla usuarios
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS usuarios ("
                "  id INT AUTO_INCREMENT PRIMARY KEY,"
                "  numero_cuenta VARCHAR(20),"
                "  nombre VARCHAR(255),"
                "  telefono VARCHAR(20),"
                "  correo VARCHAR(255),"
                "  carrera VARCHAR(50),"
                "  semestre VARCHAR(20),"
                "  area VARCHAR(100),"
                "  fecha_registro DATETIME DEFAULT CURRENT_TIMESTAMP,"
                "  fecha_termino DATE NULL"
                ")"
            )
            # Para instalaciones existentes: agregamos las columnas nuevas si faltan
            if not _columna_existe(cursor, "usuarios", "area"):
                cursor.execute("ALTER TABLE usuarios ADD COLUMN area VARCHAR(100)")
            if not _columna_existe(cursor, "usuarios", "fecha_registro"):
                cursor.execute("ALTER TABLE usuarios ADD COLUMN fecha_registro DATETIME DEFAULT CURRENT_TIMESTAMP")
            if not _columna_existe(cursor, "usuarios", "fecha_termino"):
                cursor.execute("ALTER TABLE usuarios ADD COLUMN fecha_termino DATE NULL")
            # Tabla nueva para el historico de proyectos (un alumno -> muchos proyectos)
            cursor.execute(
                "CREATE TABLE IF NOT EXISTS proyectos ("
                "  id INT AUTO_INCREMENT PRIMARY KEY,"
                "  usuario_id INT NOT NULL,"
                "  nombre VARCHAR(255) NOT NULL,"
                "  FOREIGN KEY (usuario_id) REFERENCES usuarios(id) ON DELETE CASCADE"
                ")"
            )
        conn.commit()
        conn.close()

    @app.on_event("startup")
    def _migracion_startup():
        # La BD puede tardar en estar lista; reintentamos unas veces
        for intento in range(10):
            try:
                inicializar_db()
                return
            except Exception as e:
                print(f"Esperando a la base de datos... ({intento+1}/10): {e}")
                time.sleep(3)

    # --- (Validación JWT) ---
    def verificar_token(authorization: str = Header(None)):
        if not authorization or not authorization.startswith("Bearer "):
            raise HTTPException(status_code=401, detail="Falta el gafete de seguridad (Token)")
        
        token = authorization.split(" ")[1]
        try:
            # Google verifica criptográficamente que el token no sea falso
            idinfo = id_token.verify_oauth2_token(token, google_requests.Request(), GOOGLE_CLIENT_ID)
            
            # ¡Para más seguridad! Wuuuu Descomenta esto para exigir correo UNAM:
            # if idinfo.get('hd') != 'aragon.unam.mx':
            #     raise HTTPException(status_code=403, detail="Solo correos @aragon.unam.mx autorizados")
            
            return idinfo
        except ValueError:
            raise HTTPException(status_code=401, detail="Token inválido o expirado")

    class UsuarioNuevo(BaseModel):
        numero_cuenta: str
        nombre: str
        telefono: str
        correo: str
        carrera: str
        semestre: str
        area: Optional[str] = None
        fecha_termino: Optional[str] = None

    class ProyectoNuevo(BaseModel):
        nombre: str

    # Agregamos "Depends(verificar_token)" para proteger las rutas vitales

    @app.get("/usuarios")
    def obtener_usuarios(user_info: dict = Depends(verificar_token)):
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT * FROM usuarios")
                usuarios = cursor.fetchall()
            conn.close()
            return usuarios
        except Exception as e:
            return {"status": "Error", "detalle": str(e)}

    @app.get("/usuarios/{usuario_id}")
    def obtener_perfil(usuario_id: int, user_info: dict = Depends(verificar_token)):
        # Devuelve el perfil del alumno junto con su historico de proyectos
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT * FROM usuarios WHERE id = %s", (usuario_id,))
                usuario = cursor.fetchone()
                if not usuario:
                    conn.close()
                    return {"status": "Error", "detalle": "Alumno no encontrado"}
                cursor.execute("SELECT id, nombre FROM proyectos WHERE usuario_id = %s ORDER BY id", (usuario_id,))
                usuario["proyectos"] = cursor.fetchall()
            conn.close()
            return usuario
        except Exception as e:
            return {"status": "Error", "detalle": str(e)}

    @app.post("/usuarios")
    def crear_usuario(
        numero_cuenta: str = Form(...),
        nombre: str = Form(...),
        telefono: str = Form(...),
        correo: str = Form(...),
        carrera: str = Form(...),
        semestre: str = Form(...),
        historial_pdf: UploadFile = File(...),
        user_info: dict = Depends(verificar_token) # <--- Protegido
    ):
        try:
            # Guardamos el PDF con el nombre de la persona en lugar del numero de cuenta
            file_path = f"/app/pdfs/{nombre}.pdf"
            with open(file_path, "wb") as buffer:
                shutil.copyfileobj(historial_pdf.file, buffer)

            conn = get_db_connection()
            with conn.cursor() as cursor:
                sql = "INSERT INTO usuarios (numero_cuenta, nombre, telefono, correo, carrera, semestre) VALUES (%s, %s, %s, %s, %s, %s)"
                val = (numero_cuenta, nombre, telefono, correo, carrera, semestre)
                cursor.execute(sql, val)
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Usuario y PDF guardados correctamente."}
        except Exception as e:
            return {"status": "Error", "detalle": str(e)}

    @app.get("/ver-pdf/{nombre}")
    def ver_pdf(nombre: str):
        # Esta la dejamos pública porque el navegador la abre directo en otra pestaña
        # Ahora los PDFs se guardan con el nombre de la persona
        file_path = f"/app/pdfs/{nombre}.pdf"
        if os.path.exists(file_path):
            return FileResponse(file_path, media_type="application/pdf")
        return {"Error": "Archivo no encontrado"}

    @app.put("/usuarios/{usuario_id}")
    def actualizar_usuario(usuario_id: int, usuario: UsuarioNuevo, user_info: dict = Depends(verificar_token)): # <--- Protegido
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                # Si cambia el nombre, renombramos tambien el PDF para que siga vinculado
                cursor.execute("SELECT nombre FROM usuarios WHERE id = %s", (usuario_id,))
                anterior = cursor.fetchone()
                if anterior and anterior['nombre'] != usuario.nombre:
                    ruta_anterior = f"/app/pdfs/{anterior['nombre']}.pdf"
                    ruta_nueva = f"/app/pdfs/{usuario.nombre}.pdf"
                    if os.path.exists(ruta_anterior):
                        os.rename(ruta_anterior, ruta_nueva)

                sql = "UPDATE usuarios SET numero_cuenta=%s, nombre=%s, telefono=%s, correo=%s, carrera=%s, semestre=%s, area=%s, fecha_termino=%s WHERE id=%s"
                # fecha_termino vacia la guardamos como NULL
                fecha_termino = usuario.fecha_termino if usuario.fecha_termino else None
                val = (usuario.numero_cuenta, usuario.nombre, usuario.telefono, usuario.correo, usuario.carrera, usuario.semestre, usuario.area, fecha_termino, usuario_id)
                cursor.execute(sql, val)
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Usuario actualizado."}
        except Exception as e:
            return {"status": "Error", "detalle": str(e)}

    @app.delete("/usuarios/{usuario_id}")
    def eliminar_usuario(usuario_id: int, user_info: dict = Depends(verificar_token)): # <--- Protegido
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("SELECT nombre FROM usuarios WHERE id = %s", (usuario_id,))
                user = cursor.fetchone()
                if user:
                    file_path = f"/app/pdfs/{user['nombre']}.pdf"
                    if os.path.exists(file_path):
                        os.remove(file_path)
                cursor.execute("DELETE FROM usuarios WHERE id = %s", (usuario_id,))
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Usuario y PDF eliminados."}
        except Exception as e:
            return {"status": "Error", "detalle": str(e)}

    @app.post("/usuarios/{usuario_id}/proyectos")
    def agregar_proyecto(usuario_id: int, proyecto: ProyectoNuevo, user_info: dict = Depends(verificar_token)): # <--- Protegido
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("INSERT INTO proyectos (usuario_id, nombre) VALUES (%s, %s)", (usuario_id, proyecto.nombre))
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Proyecto agregado."}
        except Exception as e:
            return {"status": "Error", "detalle": str(e)}

    @app.delete("/proyectos/{proyecto_id}")
    def eliminar_proyecto(proyecto_id: int, user_info: dict = Depends(verificar_token)): # <--- Protegido
        try:
            conn = get_db_connection()
            with conn.cursor() as cursor:
                cursor.execute("DELETE FROM proyectos WHERE id = %s", (proyecto_id,))
            conn.commit()
            conn.close()
            return {"status": "Éxito", "mensaje": "Proyecto eliminado."}
        except Exception as e:
            return {"status": "Error", "detalle": str(e)}