# Almacenamiento de los historiales PDF
# Se mantiene en su propio manifiesto (separado del Deployment) porque su ciclo
# de vida es distinto: el backend es desechable, pero estos datos NO se deben perder

# Aislarlo facilita protegerlo de un borrado accidental y prepararlo para GitOps
# (Argo CD) con politica de "no podar" (Prune=false)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-pdf-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
