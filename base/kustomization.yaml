apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Configuracion COMUN a todos los entornos: las tres capas del sistema.
# Los overlays (local/server) parten de esta base y solo cambian lo especifico
# de cada entorno (la URL del backend en el frontend).
resources:
  - ../capa-datos
  - ../capa-logica
  - ../capa-presentacion
