apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-nginx
  template:
    metadata:
      labels:
        app: frontend-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        # Montaje de la carpeta de imágenes
        - name: imagenes-vol
          mountPath: /usr/share/nginx/html/img
      volumes:
      - name: html-volume
        configMap:
          name: frontend-codigo
      # Puente al disco duro local (Minikube/K3s)
      - name: imagenes-vol
        hostPath:
          path: /data/imagenes
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: svc-frontend
spec:
  type: NodePort
  selector:
    app: frontend-nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080