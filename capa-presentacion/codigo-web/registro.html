    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Registro - Proyecto ICA</title>
        <style>
            body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
            .formulario-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
            h2 { color: #333; text-align: center; }
            .campo-formulario { margin-bottom: 15px; }
            .campo-formulario label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 14px; }
            input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
            button { width: 100%; padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px;}
            button:hover { background-color: #218838; }
        </style>
    </head>
    <body>
        <div class="formulario-container">
            <h2>Registro de Alumnos</h2>
            <form id="form-registro">
                
                <div class="campo-formulario">
                    <label for="cuenta">Número de Cuenta (9 dígitos):</label>
                    <input type="text" id="cuenta" placeholder="Ej. 315010548" required>
                </div>

                <div class="campo-formulario">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" placeholder="Ej. García Micette Leonardo Geralt" required>
                </div>

                <div class="campo-formulario">
                    <label for="telefono">Teléfono:</label>
                    <input type="text" id="telefono" placeholder="Ej. 5537147024" required>
                </div>

                <div class="campo-formulario">
                    <label for="correo">Correo Institucional:</label>
                    <input type="email" id="correo" placeholder="Ej. alumno@aragon.unam.mx" required>
                </div>

                <div class="campo-formulario">
                    <label for="carrera">Carrera:</label>
                    <input type="text" id="carrera" placeholder="Ej. ICO, ARQ" required>
                </div>

                <div class="campo-formulario">
                    <label for="semestre">Semestre:</label>
                    <select id="semestre" required>
                        <option value="2026-I">Semestre 2026-I</option>
                        <option value="2026-II">Semestre 2026-II</option>
                        <option value="2027-I">Semestre 2027-I</option>
                    </select>
                </div>

                <div class="campo-formulario">
                    <label for="historial">Historial Académico (Solo PDF, Máx. 1MB):</label>
                    <input type="file" id="historial" accept="application/pdf" required>
                </div>

                <button type="submit">Enviar Registro</button>
            </form>
        </div>
        <script>
            const apiUrl = 'http://192.168.49.2:30090/usuarios';
            
            document.getElementById('form-registro').addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Validación del peso del archivo
                const archivoInput = document.getElementById('historial');
                const archivo = archivoInput.files[0];
                const limiteBytes = 1 * 1024 * 1024; // 1 Megabyte
                
                if (archivo.size > limiteBytes) {
                    alert("Error: El archivo pesa " + (archivo.size / 1024).toFixed(2) + " KB. El límite es de 1 MB. Por favor, comprime tu PDF.");
                    return;
                }

                // Uso de FormData para enviar texto y archivo al mismo tiempo
                const formData = new FormData();
                formData.append('numero_cuenta', document.getElementById('cuenta').value);
                formData.append('nombre', document.getElementById('nombre').value.toUpperCase());
                formData.append('telefono', document.getElementById('telefono').value);
                formData.append('correo', document.getElementById('correo').value.toLowerCase());
                formData.append('carrera', document.getElementById('carrera').value.toUpperCase());
                formData.append('semestre', document.getElementById('semestre').value);
                formData.append('historial_pdf', archivo);

                fetch(apiUrl, {
                    method: 'POST',
                    body: formData // No se especifica Content-Type, el navegador lo hace solo
                }).then(res => res.json()).then(data => {
                    if(data.status === "Éxito") { 
                        alert("Registro completado y PDF guardado exitosamente."); 
                        document.getElementById('form-registro').reset(); 
                    } else {
                        alert("Error en el servidor: " + data.detalle);
                    }
                });
            });
        </script>
    </body>
    </html>
