<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Proyecto ICA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .formulario-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; }
        .campo-formulario { margin-bottom: 15px; }
        .campo-formulario label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px;}
        button:hover { background-color: #218838; }
        #login-container { text-align: center; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-top: 50px; }
    </style>

    <script>
        function handleCredentialResponse(response) {
            sessionStorage.setItem('token_ica', response.credential);
            desbloquearFormulario();
        }

        function desbloquearFormulario() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('formulario-privado').style.display = 'block';
        }

        window.onload = function() {
            if (sessionStorage.getItem('token_ica')) {
                desbloquearFormulario();
            }
        };
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="login-container">
        <h2 style="color: #0056b3;">Acceso al Registro - ICA</h2>
        <p>Inicia sesión con tu cuenta para llenar tu solicitud.</p>
        <div id="g_id_onload"
             data-client_id="374163159167-hj3aofouk0mae2ksk0qq5agevdlengfj.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="formulario-privado" style="display: none;">
        <div class="formulario-container">
            <h2>Registro de Alumnos</h2>
            <form id="form-registro">
                <div class="campo-formulario">
                    <label for="cuenta">Número de Cuenta:</label>
                    <input type="text" id="cuenta" name="numero_cuenta" required maxlength="9">
                </div>
                <div class="campo-formulario">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="campo-formulario">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" required maxlength="10">
                </div>
                <div class="campo-formulario">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" name="correo" required>
                </div>
                <div class="campo-formulario">
                    <label for="carrera">Carrera:</label>
                    <select id="carrera" name="carrera" required>
                        <option value="ICO">Ing. en Computación</option>
                        <option value="IME">Ing. Mecánica Eléctrica</option>
                        <option value="IIND">Ing. Industrial</option>
                        <option value="CIVIL">Ing. Civil</option>
                    </select>
                </div>
                <div class="campo-formulario">
                    <label for="semestre">Semestre Actual:</label>
                    <select id="semestre" name="semestre" required>
                        <option value="2027-II">2027-II</option>
                        <option value="2027-I">2027-I</option>
                        <option value="2026-II">2026-II</option>
                        <option value="2026-I">2026-I</option>
                    </select>
                </div>
                <div class="campo-formulario">
                    <label for="pdf">Historial Académico (PDF):</label>
                    <input type="file" id="pdf" name="historial_pdf" accept="application/pdf" required>
                </div>
                <button type="submit">Enviar Registro</button>
            </form>
        </div>

        <script>
            const apiUrl = 'http://192.168.49.2.nip.io:30090/usuarios';

            document.getElementById('form-registro').addEventListener('submit', function(e) {
                e.preventDefault();
                const token = sessionStorage.getItem('token_ica');
                const archivo = document.getElementById('pdf').files[0];

                if (archivo && archivo.size > 1024 * 1024) {
                    alert("El archivo excede 1 MB.");
                    return;
                }

                const formData = new FormData();
                formData.append('numero_cuenta', document.getElementById('cuenta').value);
                formData.append('nombre', document.getElementById('nombre').value.toUpperCase());
                formData.append('telefono', document.getElementById('telefono').value);
                formData.append('correo', document.getElementById('correo').value.toLowerCase());
                formData.append('carrera', document.getElementById('carrera').value.toUpperCase());
                formData.append('semestre', document.getElementById('semestre').value);
                formData.append('historial_pdf', archivo);

                fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === "Éxito") { 
                        alert("¡Registro guardado!"); 
                        document.getElementById('form-registro').reset(); 
                    } else {
                        alert("Error: " + data.detalle);
                    }
                })
                .catch(err => alert("Fallo al conectar con el servidor."));
            });
        </script>
    </div>
</body>
</html>
