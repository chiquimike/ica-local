<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - ICA</title>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; padding: 20px; }
        h1 { color: #0056b3; text-align: center; }
        .controles { 
            background: white; padding: 15px; border-radius: 8px; 
            margin-bottom: 20px; display: none; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #0056b3; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .btn-editar { background-color: #ffc107; color: black; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-eliminar { background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; margin-left: 5px; font-weight: bold; }
        .btn-excel { background-color: #28a745; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #login-container { text-align: center; margin-top: 100px; }
    </style>

    <script>
        const apiUrl = 'http://192.168.49.2.nip.io:30090/usuarios';
        let datosGlobales = [];

        function handleCredentialResponse(response) {
            console.log("¡Google validó el acceso!");
            sessionStorage.setItem('token_ica', response.credential);
            desbloquearInterfaz();
        }

        function desbloquearInterfaz() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('contenido-profesor').style.display = 'block';
            document.getElementById('controles').style.display = 'flex';
            cargarDatosApi();
        }

        function cargarDatosApi() {
            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    datosGlobales = data;
                    renderizarTabla(data);
                })
                .catch(err => console.error("Error al cargar datos:", err));
        }

        window.onload = function() {
            if (sessionStorage.getItem('token_ica')) {
                desbloquearInterfaz();
            }
        };
    </script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="login-container">
        <h2 style="color: #0056b3;">Innovation Center Aragón</h2>
        <p>Inicia sesión para gestionar el Servicio Social</p>
        <div id="g_id_onload"
             data-client_id="374163159167-hj3aofouk0mae2ksk0qq5agevdlengfj.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="contenido-profesor" style="display: none;">
        <h1>Panel de Administración</h1>
        
        <div id="controles" class="controles">
            <div>
                <label><strong>Filtrar por Semestre: </strong></label>
                <select id="filtro-semestre" onchange="renderizarTabla()">
                    <option value="todos">Mostrar Todos</option>
                    <option value="2027-II">2027-II</option>
                    <option value="2027-I">2027-I</option>
                    <option value="2026-II">2026-II</option>
                    <option value="2026-I">2026-I</option>
                </select>
            </div>
            <button class="btn-excel" onclick="descargarExcel()">📥 Descargar Excel</button>
        </div>

        <table id="tabla-usuarios">
            <thead>
                <tr>
                    <th>No. Cuenta</th><th>Nombre</th><th>Teléfono</th><th>Correo</th><th>Carrera</th><th>Semestre</th>
                    <th>Historial</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <script>
            function renderizarTabla(datos = datosGlobales) {
                const filtro = document.getElementById('filtro-semestre').value;
                const tbody = document.querySelector('#tabla-usuarios tbody');
                tbody.innerHTML = '';

                const usuariosFiltrados = (filtro === 'todos') ? datos : datos.filter(u => u.semestre === filtro);

                usuariosFiltrados.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.numero_cuenta}</td>
                        <td>${u.nombre}</td>
                        <td>${u.telefono}</td>
                        <td>${u.correo}</td>
                        <td>${u.carrera}</td>
                        <td>${u.semestre}</td>
                        <td><a href="http://192.168.49.2.nip.io:30090/pdfs/${u.numero_cuenta}.pdf" target="_blank">📄 Ver</a></td>
                        <td>
                            <button class="btn-editar" onclick="editarUsuario('${u.id}')">✏️</button>
                            <button class="btn-eliminar" onclick="eliminarUsuario('${u.id}')">🗑️</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            function eliminarUsuario(id) {
                if(confirm("¿Seguro que deseas eliminar este registro?")) {
                    fetch(`${apiUrl}/${id}`, { method: 'DELETE' })
                        .then(res => res.json())
                        .then(() => { alert("Eliminado"); cargarDatosApi(); });
                }
            }

            function editarUsuario(id) {
                const u = datosGlobales.find(user => user.id == id);
                const nNombre = prompt("Nombre:", u.nombre);
                const nTel = prompt("Teléfono:", u.telefono);
                const nCor = prompt("Correo:", u.correo);
                const nCar = prompt("Carrera:", u.carrera);
                const nSem = prompt("Semestre:", u.semestre);

                if(nNombre && nTel && nCor && nCar && nSem) {
                    fetch(`${apiUrl}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            numero_cuenta: u.numero_cuenta,
                            nombre: nNombre.toUpperCase(),
                            telefono: nTel,
                            correo: nCor.toLowerCase(),
                            carrera: nCar.toUpperCase(),
                            semestre: nSem
                        })
                    })
                    .then(res => res.json())
                    .then(() => { alert("Actualizado"); cargarDatosApi(); });
                }
            }

            function descargarExcel() {
                const filtro = document.getElementById('filtro-semestre').value;
                const datosAExportar = (filtro === "todos") ? datosGlobales : datosGlobales.filter(u => u.semestre === filtro);
                let csv = "No. Cuenta,Nombre,Telefono,Correo,Carrera,Semestre\n";
                datosAExportar.forEach(u => {
                    csv += `"${u.numero_cuenta}","${u.nombre}","${u.telefono}","${u.correo}","${u.carrera}","${u.semestre}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `Alumnos_ICA_${filtro}.csv`;
                a.click();
            }
        </script>
    </div>
</body>
</html>
