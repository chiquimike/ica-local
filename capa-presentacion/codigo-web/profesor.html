<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - ICA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; padding: 20px; }
        h1 { color: #0056b3; text-align: center; }
        .controles { 
            background: white; padding: 15px; border-radius: 8px; 
            margin-bottom: 20px; display: none; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #0056b3; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .btn-editar { background-color: #ffc107; color: black; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-eliminar { background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; margin-left: 5px; font-weight: bold; }
        .btn-excel { background-color: #28a745; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-pdf { background-color: #0056b3; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-left: 8px; }
        #login-container { text-align: center; margin-top: 100px; }
        .clickable-row { cursor: pointer; }
        .clickable-row:hover { background-color: #d6e4ff !important; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow: auto; }
        .modal-card { background: white; margin: 40px auto; padding: 25px 30px; border-radius: 8px; width: 100%; max-width: 520px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .modal-card h2 { margin-top: 0; color: #0056b3; }
        .perfil-campo { margin-bottom: 12px; }
        .perfil-campo label { font-weight: bold; display: block; margin-bottom: 3px; color: #444; font-size: 14px; }
        .perfil-campo .valor { color: #222; }
        .perfil-campo select, .perfil-campo input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .lista-proyectos { list-style: none; padding: 0; margin: 0; }
        .lista-proyectos li { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border: 1px solid #eee; border-radius: 4px; margin-bottom: 5px; }
        .btn-cerrar { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: #888; }
        .btn-guardar { background-color: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-mini { background-color: #dc3545; color: white; border: none; padding: 3px 8px; cursor: pointer; border-radius: 3px; }
        .fila-agregar { display: flex; gap: 5px; margin-top: 8px; }
        .fila-agregar input { flex: 1; }
        .fila-agregar button { background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>

    <!-- URL del backend segun el entorno (la define config.js, inyectado por Kustomize) -->
    <script src="config.js"></script>
    <script>
        const apiUrl = window.API_BASE + '/usuarios';
        let datosGlobales = [];

        function handleCredentialResponse(response) {
            console.log("¡Token de Google obtenido!");
            sessionStorage.setItem('token_ica', response.credential);
            desbloquearInterfaz();
        }

        function desbloquearInterfaz() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('contenido-profesor').style.display = 'block';
            document.getElementById('controles').style.display = 'flex';
            cargarDatosApi();
        }

        function cargarDatosApi() {
            const token = sessionStorage.getItem('token_ica');
            fetch(apiUrl, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(async res => {
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || data.detalle || "No autorizado");
                return data;
            })
            .then(data => {
                if (!Array.isArray(data)) throw new Error(data.detail || data.detalle || "Respuesta inesperada del servidor");
                datosGlobales = data;
                renderizarTabla(data);
            })
            .catch(err => alert("Error: " + err.message));
        }

        window.onload = function() {
            if (sessionStorage.getItem('token_ica')) {
                desbloquearInterfaz();
            }
        };
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="login-container">
        <h2 style="color: #0056b3;">Innovation Center Aragón</h2>
        <p>Inicia sesión para gestionar el Servicio Social</p>
        <div id="g_id_onload"
             data-client_id="374163159167-hj3aofouk0mae2ksk0qq5agevdlengfj.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="contenido-profesor" style="display: none;">
        <h1>Panel de Administración</h1>
        
        <div id="controles" class="controles">
            <div>
                <label><strong>Filtrar por Semestre: </strong></label>
                <select id="filtro-semestre" onchange="renderizarTabla()">
                    <option value="todos">Mostrar Todos</option>
                    <option value="2027-II">2027-II</option>
                    <option value="2027-I">2027-I</option>
                    <option value="2026-II">2026-II</option>
                    <option value="2026-I">2026-I</option>
                </select>
            </div>
            <div>
                <button class="btn-excel" onclick="descargarExcel()">📥 Descargar Excel</button>
                <button class="btn-pdf" onclick="descargarPdfs()">📄 Descargar PDFs</button>
            </div>
        </div>

        <table id="tabla-usuarios">
            <thead>
                <tr>
                    <th>No. Cuenta</th><th>Nombre</th><th>Teléfono</th><th>Correo</th><th>Carrera</th><th>Semestre</th>
                    <th>Historial</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Ventana emergente (modal) con el perfil del alumno -->
        <div id="modal-perfil" class="modal-overlay" onclick="if(event.target === this) cerrarPerfil()">
            <div class="modal-card">
                <button class="btn-cerrar" onclick="cerrarPerfil()">&times;</button>
                <h2 id="perfil-titulo"></h2>
                <div id="perfil-cuerpo"></div>
            </div>
        </div>

        <script>
            function renderizarTabla(datos = datosGlobales) {
                const filtro = document.getElementById('filtro-semestre').value;
                const tbody = document.querySelector('#tabla-usuarios tbody');
                tbody.innerHTML = '';

                const usuariosFiltrados = (filtro === 'todos') ? datos : datos.filter(u => u.semestre === filtro);

                usuariosFiltrados.forEach(u => {
                    const tr = document.createElement('tr');
                    // La fila es clicable para abrir el perfil del alumno
                    tr.className = 'clickable-row';
                    tr.title = 'Clic para ver el perfil';
                    tr.onclick = () => abrirPerfil(u.id);
                    tr.innerHTML = `
                        <td>${u.numero_cuenta}</td>
                        <td>${u.nombre}</td>
                        <td>${u.telefono}</td>
                        <td>${u.correo}</td>
                        <td>${u.carrera}</td>
                        <td>${u.semestre}</td>
                        <td><a href="#" onclick="event.stopPropagation(); verPdf(${u.id}); return false;">📄 Ver</a></td>
                        <td>
                            <button class="btn-editar" onclick="event.stopPropagation(); editarUsuario('${u.id}')">✏️</button>
                            <button class="btn-eliminar" onclick="event.stopPropagation(); eliminarUsuario('${u.id}')">🗑️</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            function eliminarUsuario(id) {
                if(confirm("¿Seguro que deseas eliminar este registro?")) {
                    const token = sessionStorage.getItem('token_ica');
                    fetch(`${apiUrl}/${id}`, { 
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                    .then(res => res.json())
                    .then(() => { alert("Registro eliminado"); cargarDatosApi(); });
                }
            }

            function editarUsuario(id) {
                const u = datosGlobales.find(user => user.id == id);
                const nNombre = prompt("Nombre:", u.nombre);
                const nTel = prompt("Teléfono:", u.telefono);
                const nCor = prompt("Correo:", u.correo);
                const nCar = prompt("Carrera:", u.carrera);
                const nSem = prompt("Semestre:", u.semestre);

                if(nNombre && nTel && nCor && nCar && nSem) {
                    const token = sessionStorage.getItem('token_ica');
                    fetch(`${apiUrl}/${id}`, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({
                            numero_cuenta: u.numero_cuenta,
                            nombre: nNombre.toUpperCase(),
                            telefono: nTel,
                            correo: nCor.toLowerCase(),
                            carrera: nCar.toUpperCase(),
                            semestre: nSem
                        })
                    })
                    .then(res => res.json())
                    .then(() => { alert("Registro actualizado"); cargarDatosApi(); });
                }
            }

            // === Perfil del alumno (modal) ===

            // OJO: ajusta estas areas a las que use el Centro de Innovacion
            const AREAS = ["Desarrollo de Software", "Redes y Telecomunicaciones", "Bases de Datos", "Soporte Técnico", "Diseño Web", "Administración de Sistemas"];
            // Nombre completo de cada carrera para mostrarlo en el perfil
            const CARRERAS = { "ICO": "Ingeniería en Computación", "IME": "Ingeniería Mecánica Eléctrica", "IIND": "Ingeniería Industrial", "CIVIL": "Ingeniería Civil" };
            const SEMANAS = ["1ra semana", "2da semana", "3ra semana"];

            function abrirPerfil(id) {
                const token = sessionStorage.getItem('token_ica');
                fetch(`${apiUrl}/${id}`, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(res => res.json())
                .then(u => {
                    if (u.status === "Error") { alert("Error: " + u.detalle); return; }
                    mostrarPerfil(u);
                })
                .catch(err => alert("Error al cargar el perfil: " + err.message));
            }

            function mostrarPerfil(u) {
                document.getElementById('perfil-titulo').textContent = u.nombre;
                const carreraCompleta = CARRERAS[u.carrera] || u.carrera;
                const opcionesArea = AREAS.map(a => `<option value="${a}" ${u.area === a ? 'selected' : ''}>${a}</option>`).join('');
                const opcionesSemana = SEMANAS.map(s => `<option value="${s}" ${u.semana_registro === s ? 'selected' : ''}>${s}</option>`).join('');

                document.getElementById('perfil-cuerpo').innerHTML = `
                    <div class="perfil-campo"><label>No. de Cuenta</label><div class="valor">${u.numero_cuenta}</div></div>
                    <div class="perfil-campo"><label>Carrera</label><div class="valor">${carreraCompleta}</div></div>
                    <div class="perfil-campo"><label>Semestre</label><div class="valor">${u.semestre}</div></div>
                    <div class="perfil-campo"><label>Correo</label><div class="valor">${u.correo}</div></div>
                    <div class="perfil-campo"><label>Teléfono</label><div class="valor">${u.telefono}</div></div>
                    <div class="perfil-campo">
                        <label>Semana de registro</label>
                        <select id="perfil-semana"><option value="">-- Sin asignar --</option>${opcionesSemana}</select>
                    </div>
                    <div class="perfil-campo">
                        <label>Área</label>
                        <select id="perfil-area"><option value="">-- Sin asignar --</option>${opcionesArea}</select>
                    </div>
                    <button class="btn-guardar" onclick="guardarPerfil(${u.id})">💾 Guardar datos del perfil</button>
                    <div class="perfil-campo" style="margin-top: 20px;">
                        <label>Histórico de proyectos</label>
                        <ul class="lista-proyectos" id="lista-proyectos"></ul>
                        <div class="fila-agregar">
                            <input type="text" id="nuevo-proyecto" placeholder="Nombre del proyecto">
                            <button onclick="agregarProyecto(${u.id})">Agregar</button>
                        </div>
                    </div>
                `;
                renderProyectos(u.id, u.proyectos || []);
                document.getElementById('modal-perfil').style.display = 'block';
            }

            function renderProyectos(usuarioId, proyectos) {
                const ul = document.getElementById('lista-proyectos');
                if (!proyectos.length) {
                    ul.innerHTML = '<li style="color:#888;">Sin proyectos registrados</li>';
                    return;
                }
                ul.innerHTML = proyectos.map(p => `
                    <li><span>${p.nombre}</span>
                    <button class="btn-mini" onclick="eliminarProyecto(${p.id}, ${usuarioId})">Quitar</button></li>
                `).join('');
            }

            function guardarPerfil(id) {
                const u = datosGlobales.find(user => user.id == id);
                const area = document.getElementById('perfil-area').value;
                const semanaRegistro = document.getElementById('perfil-semana').value;
                const token = sessionStorage.getItem('token_ica');
                fetch(`${apiUrl}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({
                        numero_cuenta: u.numero_cuenta,
                        nombre: u.nombre,
                        telefono: u.telefono,
                        correo: u.correo,
                        carrera: u.carrera,
                        semestre: u.semestre,
                        area: area,
                        semana_registro: semanaRegistro
                    })
                })
                .then(res => res.json())
                .then(() => { alert("Perfil actualizado"); cargarDatosApi(); });
            }

            function agregarProyecto(usuarioId) {
                const input = document.getElementById('nuevo-proyecto');
                const nombre = input.value.trim();
                if (!nombre) { alert("Escribe el nombre del proyecto"); return; }
                const token = sessionStorage.getItem('token_ica');
                fetch(`${apiUrl}/${usuarioId}/proyectos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ nombre: nombre })
                })
                .then(res => res.json())
                .then(() => { abrirPerfil(usuarioId); }); // recargamos el perfil con el proyecto nuevo
            }

            function eliminarProyecto(proyectoId, usuarioId) {
                if (!confirm("¿Quitar este proyecto?")) return;
                const token = sessionStorage.getItem('token_ica');
                fetch(`${window.API_BASE}/proyectos/${proyectoId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(res => res.json())
                .then(() => { abrirPerfil(usuarioId); });
            }

            function cerrarPerfil() {
                document.getElementById('modal-perfil').style.display = 'none';
            }

            // Abre el historial PDF (endpoint protegido) enviando el token y mostrandolo via blob
            function verPdf(id) {
                const u = datosGlobales.find(user => user.id == id);
                if (!u) return;
                const token = sessionStorage.getItem('token_ica');
                fetch(`${window.API_BASE}/ver-pdf/${encodeURIComponent(u.nombre)}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(res => {
                    if (!res.ok) throw new Error("No se pudo abrir el historial PDF");
                    return res.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    window.open(url, '_blank');
                    setTimeout(() => window.URL.revokeObjectURL(url), 60000);
                })
                .catch(err => alert("Error: " + err.message));
            }

            function descargarExcel() {
                const filtro = document.getElementById('filtro-semestre').value;
                const datosAExportar = (filtro === "todos") ? datosGlobales : datosGlobales.filter(u => u.semestre === filtro);
                let csv = "No. Cuenta,Nombre,Telefono,Correo,Carrera,Semestre\n";
                datosAExportar.forEach(u => {
                    csv += `"${u.numero_cuenta}","${u.nombre}","${u.telefono}","${u.correo}","${u.carrera}","${u.semestre}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `Alumnos_ICA_${filtro}.csv`;
                a.click();
            }

            function descargarPdfs() {
                const filtro = document.getElementById('filtro-semestre').value;
                const token = sessionStorage.getItem('token_ica');
                fetch(`${window.API_BASE}/descargar-pdfs?semestre=${encodeURIComponent(filtro)}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(res => {
                    if (!res.ok) throw new Error("No se pudieron descargar los PDFs");
                    return res.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `Historiales_ICA_${filtro}.zip`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                })
                .catch(err => alert("Error: " + err.message));
            }

        </script>
    </div>
</body>
</html>
